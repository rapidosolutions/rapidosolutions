name: Verify Rapido

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm --prefix backend ci
      - run: npm test
      - run: npm --prefix backend test
      - run: npm run build
      - run: npm audit --audit-level=high
      - run: npm --prefix backend audit --audit-level=high
