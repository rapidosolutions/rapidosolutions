services:
  - type: web
    name: rapido-api
    runtime: node
    plan: starter
    buildCommand: npm --prefix backend ci
    startCommand: npm --prefix backend run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: none
      - key: ADMIN_EMAIL
        value: rapidosolutionsco@outlook.com
      - key: CONTACT_RECIPIENT_EMAIL
        value: rapidosolutionsco@outlook.com
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URLS
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
